
<div class="container mt-5" style="max-width: 500px;">
  <div class="card">
    <div class="card-header ggc-green white-text">
      Login
    </div>
    <div class="card-body">
      <form (ngSubmit)="login()">
        <div class="form-group">
          <label for="username">
            <i class="ion-person prefix"></i>Username
          </label>
          <input [(ngModel)]="username" name="username" id="username" class="form-control" required />
        </div>

        <div class="form-group mt-3">
          <label for="password">
            <i class="ion-lock-combination prefix"></i>Password
          </label>
          <input [(ngModel)]="password" name="password" id="password" type="password" class="form-control" required />
        </div>

        <div class="text-danger mt-2" *ngIf="error">{{ error }}</div>

        <button class="btn btn-success btn-block mt-3" [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Submit' }}
        </button>
      </form>
    </div>
  </div>
</div>
