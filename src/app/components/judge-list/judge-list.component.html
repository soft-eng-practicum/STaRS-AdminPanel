<div class="container">
  <div class="card">
    <div class="card-header ggc-green white-text py-2">
      Judge Reports: Please select one of the following judges to continue
    </div>

    <div class="card-body">
      <div class="md-form mb-3">
        <i class="ion-search prefix"></i>
        <input
          type="text"
          id="search"
          class="form-control"
          [ngModel]="searchValue()"
          (ngModelChange)="searchValue.set($event)"
        />
        <label for="search">Search: Poster, Student, or Judge</label>

        <p>Found {{ sortedFilteredJudges.length }} judges.</p>
      </div>

      <div class="table-responsive">
      <table class="table table-bordered table-sm table-hover">
        <thead>
        <tr>
          <th (click)="sortBy('name')">
            Judge
            <i class="ml-1" *ngIf="sortField() === 'name'" [ngClass]="getSortIcon('name')"></i>
          </th>
          <th (click)="sortBy('surveyLength')">
            Number of Surveys
            <i class="ml-1" *ngIf="sortField() === 'surveyLength'" [ngClass]="getSortIcon('surveyLength')"></i>
          </th>
          <th>Groups Surveyed</th>
          <th></th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let judge of sortedFilteredJudges">
          <td>{{ judge.name }}</td>
          <td>{{ judge.surveyLength }}</td>
          <td>
            <ul class="mb-0">
              <li class="left" *ngFor="let group of judge.groupsSurveyed">
                <strong>#{{ group.id }}:</strong> {{ group.name }}
              </li>
            </ul>
          </td>
          <td>
            <a
              class="btn btn-primary btn-sm"
              [routerLink]="['/judge', judge.id]"
            >
              View
            </a>
          </td>
        </tr>
        </tbody>
      </table>
      </div>
    </div>
  </div>
</div>
